# Local / self-host stack: MongoDB + Fastify API + static Vue frontend.
#
#   docker compose up --build
#     Frontend → http://localhost:5173      API → http://localhost:3000
#
# Secrets are optional — the stack boots without them. To set them, create a
# root `.env` (gitignored); compose substitutes the ${VAR} values below:
#   HELIUS_API_KEY=...            # better Solana RPC limits
#   DISCORD_CLIENT_ID=...         # required for "Sign in with Discord"
#   DISCORD_CLIENT_SECRET=...     # (register redirect http://localhost:3000/auth/discord/callback)
#
# NODE_ENV defaults to `development` so it runs against localhost out of the box.
# For a real deployment set NODE_ENV=production AND provide Discord creds with
# non-localhost callback URLs (the API refuses to boot otherwise), set a strong
# JWT_SECRET, and rebuild the frontend with VITE_API_URL pointing at the public API.

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "3000"
      MONGODB_URI: mongodb://mongo:27017/pnl
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CRON_SECRET: ${CRON_SECRET:-dev-cron-secret}
      HELIUS_API_KEY: ${HELIUS_API_KEY:-}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-}
      SUI_RPC_URL: ${SUI_RPC_URL:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      DISCORD_CALLBACK_URL: ${DISCORD_CALLBACK_URL:-http://localhost:3000/auth/discord/callback}
      FRONTEND_AUTH_CALLBACK: ${FRONTEND_AUTH_CALLBACK:-http://localhost:5173/auth/callback}
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mongo-data:
