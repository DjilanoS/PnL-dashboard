server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: vue-router uses history mode, so unknown paths (e.g.
  # /auth/callback, /settings) must still serve index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Vite emits content-hashed assets — safe to cache forever.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
